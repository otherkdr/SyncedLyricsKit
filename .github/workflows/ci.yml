name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    # macos-15 ships Xcode 16 / Swift 6, which is required for the
    # `--build-system native` flag used below.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # The default SwiftPM build system leaves an unremovable
      # com.apple.provenance xattr on the signed test bundle, which fails
      # codesigning; the native build system avoids it.
      - name: Run tests
        run: swift test --build-system native
